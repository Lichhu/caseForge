# CaseForge Nginx 配置
#
# 部署模型：
#   - 前端：apps/web/dist 纯静态资源，由 Nginx 直接 serve（最优性能）
#   - 后端：NestJS API（PM2 fork 单实例）监听 127.0.0.1:34550
#   - 前端默认调用相对路径 /api/v1，由 Nginx 反代到 Node
#
# 安装：
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/caseforge
#   sudo ln -s /etc/nginx/sites-available/caseforge /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

upstream caseforge_api {
    server 127.0.0.1:34550;
    keepalive 32;
}

server {
    listen 80;
    server_name 36.114.32.7;  # TODO: 改成你的域名或服务器 IP

    # —— 前端静态资源根目录 —— TODO: 改成实际部署路径
    root /var/www/caseforge/apps/web/dist;
    index index.html;

    # —— gzip 压缩（性能关键）——
    gzip on;
    gzip_vary on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # 上传大文档时放开请求体大小（匹配后端 express 50mb 限制）
    client_max_body_size 50m;

    # —— 带 hash 的构建产物长期缓存 ——
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # 字体等静态资源缓存
    location ~* \.(woff2?|ttf|eot|otf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # —— API 反向代理（前端默认走 /api/v1）——
    location /api/ {
        proxy_pass http://caseforge_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # AI 生成 / 大文件处理耗时较长，加大超时
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        # 关闭代理缓冲，便于流式/长任务响应
        proxy_buffering off;
    }

    # —— Swagger 文档（可选，生产环境可注释掉）——
    location /docs {
        proxy_pass http://caseforge_api;
        proxy_set_header Host $host;
    }

    # —— SPA 路由回退 ——
    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html 不缓存，保证发版后立即生效
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
